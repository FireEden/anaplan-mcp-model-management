<svg width="680" height="460" viewBox="0 0 680 460" xmlns="http://www.w3.org/2000/svg" role="img" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
<title>Anaplan MCP architecture</title>
<desc>Flow from the user, through an AI assistant, to the MCP server, which calls the Anaplan Integration API and returns results.</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<rect x="40" y="40" width="180" height="56" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="130" y="66" text-anchor="middle" font-size="14" font-weight="500" fill="#2C2C2A">You</text>
<text x="130" y="84" text-anchor="middle" font-size="12" fill="#5F5E5A">"Run the actuals import"</text>

<rect x="250" y="40" width="180" height="56" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text x="340" y="66" text-anchor="middle" font-size="14" font-weight="500" fill="#0C447C">AI assistant</text>
<text x="340" y="84" text-anchor="middle" font-size="12" fill="#185FA5">Claude / Cursor</text>

<rect x="250" y="190" width="180" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="340" y="216" text-anchor="middle" font-size="14" font-weight="500" fill="#3C3489">MCP server</text>
<text x="340" y="234" text-anchor="middle" font-size="12" fill="#534AB7">13 tools, confirm gate</text>

<rect x="250" y="340" width="180" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="340" y="366" text-anchor="middle" font-size="14" font-weight="500" fill="#085041">Anaplan API</text>
<text x="340" y="384" text-anchor="middle" font-size="12" fill="#0F6E56">Integration API v2</text>

<rect x="470" y="178" width="170" height="40" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="555" y="202" text-anchor="middle" font-size="12" fill="#3C3489">Imports / exports</text>
<rect x="470" y="226" width="170" height="40" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="555" y="250" text-anchor="middle" font-size="12" fill="#3C3489">Modules / line items</text>

<line x1="220" y1="68" x2="246" y2="68" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="340" y1="96" x2="340" y2="186" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="340" y1="246" x2="340" y2="336" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="430" y1="198" x2="466" y2="198" stroke="#B4B2A9" stroke-width="0.5" stroke-dasharray="3 3"/>
<line x1="430" y1="218" x2="466" y2="246" stroke="#B4B2A9" stroke-width="0.5" stroke-dasharray="3 3"/>

<text x="352" y="145" text-anchor="start" font-size="12" fill="#5F5E5A">calls a tool</text>
<text x="352" y="295" text-anchor="start" font-size="12" fill="#5F5E5A">authenticated request</text>
</svg>
